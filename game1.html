<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h1>Click Game</h1>

<p id="score">0</p>

<button onclick="clickGame()">CLICK</button>

<script>

let score=0;

function clickGame(){
score++
document.getElementById("score").innerText=score
}

</script>

</body>
</html>
