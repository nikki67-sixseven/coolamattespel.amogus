<!DOCTYPE html>
<html>
<head>
<title>Among Game Hub</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
margin-top:40px;
}

.menu{
display:grid;
grid-template-columns:repeat(5,150px);
gap:20px;
justify-content:center;
margin-top:50px;
}

.game{
background:#111;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.game:hover{
background:red;
transform:scale(1.1);
}

.crewmate{
position:absolute;
width:60px;
animation:move 20s linear infinite;
}

@keyframes move{
0%{left:-100px}
100%{left:110%}
}

.secret{
position:fixed;
bottom:10px;
right:10px;
background:#000;
color:#000;
border:none;
}

</style>

</head>

<body>

<h1>AMONG GAME HUB</h1>

<div class="menu">

<div class="game" onclick="openGame(1)">Game 1</div>
<div class="game" onclick="openGame(2)">Game 2</div>
<div class="game" onclick="openGame(3)">Game 3</div>
<div class="game" onclick="openGame(4)">Game 4</div>
<div class="game" onclick="openGame(5)">Game 5</div>

<div class="game" onclick="openGame(6)">Game 6</div>
<div class="game" onclick="openGame(7)">Game 7</div>
<div class="game" onclick="openGame(8)">Game 8</div>
<div class="game" onclick="openGame(9)">Game 9</div>
<div class="game" onclick="openGame(10)">Game 10</div>

</div>

<img class="crewmate" src="https://upload.wikimedia.org/wikipedia/en/9/9a/Among_Us_character.png" style="top:20%">
<img class="crewmate" src="https://upload.wikimedia.org/wikipedia/en/9/9a/Among_Us_character.png" style="top:60%">

<button class="secret" onclick="secret()">.</button>

<script>

function openGame(num){
window.location.href="game"+num+".html";
}

function secret(){
window.location.href="impostor.html";
}

</script>

</body>
</html>
<button onclick="admin()" style="opacity:0.01">.</button>

<script>

function admin(){

let pass=prompt("Admin password")

if(pass=="impostor"){
window.location="admin.html"
}

}

</script>
<button onclick="impostor()" style="opacity:0.01; position:fixed; bottom:5px; right:5px;">.</button>

<script>

function impostor(){

let pass = prompt("Enter access code")

if(pass == "redsus"){

window.location="impostor.html"

}else{

alert("Access denied")

}

}

</script>
